<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Notes App</title>

<style>
body{
    margin:0;
    font-family: "Cairo", sans-serif;
    background:#f5f6fa;
    display:flex;
    justify-content:center;
    padding:30px;
    transition:0.3s;
}

/* Dark Mode */
body.dark{
    background:#1e1e2f;
    color:white;
}

.app{
    width:100%;
    max-width:600px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

h1{
    font-size:22px;
}

textarea{
    width:100%;
    height:100px;
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
    resize:none;
    font-size:15px;
}

button{
    cursor:pointer;
    border:none;
    border-radius:8px;
    padding:10px 15px;
    transition:0.3s;
}

.add-btn{
    width:100%;
    background:#6c5ce7;
    color:white;
    margin-top:10px;
}

.add-btn:hover{
    background:#5a4bd6;
}

.theme-btn{
    background:#ddd;
    border-radius:50%;
    width:40px;
    height:40px;
}

body.dark .theme-btn{
    background:#333;
    color:white;
}

.note{
    background:white;
    padding:12px;
    border-radius:10px;
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    animation:fade 0.3s ease;
}

body.dark .note{
    background:#2b2b3d;
}

.actions button{
    margin-left:5px;
    padding:5px 8px;
    font-size:12px;
}

.edit{
    background:#00b894;
    color:white;
}

.delete{
    background:#d63031;
    color:white;
}

@keyframes fade{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="app">

    <div class="header">
        <h1>📝 Notes App</h1>
        <button class="theme-btn" onclick="toggleTheme()">🌙</button>
    </div>

    <textarea id="input" placeholder="اكتب ملاحظتك..."></textarea>
    <button class="add-btn" onclick="addNote()">إضافة ملاحظة</button>

    <div id="notes"></div>
</div>

<script>
let notes = JSON.parse(localStorage.getItem("notes")) || [];
let editIndex = -1;

function render(){
    const container = document.getElementById("notes");
    container.innerHTML = "";

    notes.forEach((n, i) => {
        container.innerHTML += `
        <div class="note">
            <span>${n}</span>
            <div class="actions">
                <button class="edit" onclick="editNote(${i})">تعديل</button>
                <button class="delete" onclick="deleteNote(${i})">حذف</button>
            </div>
        </div>`;
    });

    localStorage.setItem("notes", JSON.stringify(notes));
}

function addNote(){
    const input = document.getElementById("input");
    const value = input.value.trim();

    if(value === "") return;

    if(editIndex === -1){
        notes.push(value);
    }else{
        notes[editIndex] = value;
        editIndex = -1;
    }

    input.value = "";
    render();
}

function deleteNote(i){
    notes.splice(i,1);
    render();
}

function editNote(i){
    document.getElementById("input").value = notes[i];
    editIndex = i;
}

function toggleTheme(){
    document.body.classList.toggle("dark");
}

render();
</script>

</body>
</html>
